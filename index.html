<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OVEJA CLOUD LIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Bloqueo visual básico */
        img { pointer-events: none; -webkit-user-select: none; user-select: none; }
        body { -webkit-tap-highlight-color: transparent; }
        .grid-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 4px; padding: 4px; }
    </style>
</head>
<body class="bg-black text-white">
    <header class="p-8 text-center bg-zinc-950 border-b border-zinc-900">
        <h1 class="text-4xl font-black tracking-tighter italic text-orange-500 uppercase">Oveja Cloud Live</h1>
        <p class="text-zinc-500 text-sm font-medium mt-2">LAS FOTOS APARECEN AQUÍ AUTOMÁTICAMENTE</p>
    </header>

    <div id="galeria" class="grid-gallery">
        </div>

    <script>
        const S_URL = "https://ndmduyqfxlqiirekmnga.supabase.co"; 
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kbWR1eXFmeGxxaWlyZWttbmdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjQzNDAsImV4cCI6MjA4ODEwMDM0MH0.1k29DJKccBgkwJinvAZOBlchSEMQUjU0C7uY8CKsbPw"; // La que empieza por eyJ...
        const _supabase = supabase.createClient(S_URL, S_KEY);

        async function cargar() {
            const { data } = await _supabase.storage.from('revelado-live').list('', {
                limit: 100, sortBy: { column: 'created_at', order: 'desc' }
            });

            if (data) {
                const contenedor = document.getElementById('galeria');
                contenedor.innerHTML = data.map(f => `
                    <div class="aspect-square bg-zinc-900 overflow-hidden relative border border-white/5">
                        <img src="${S_URL}/storage/v1/object/public/revelado-live/${f.name}" 
                             class="w-full h-full object-cover">
                    </div>
                `).join('');
            }
        }
        setInterval(cargar, 5000);
        cargar();
    </script>
</body>
</html>
