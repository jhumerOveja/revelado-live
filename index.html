<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Live - Oveja Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">
    <header class="p-6 text-center border-b border-zinc-800">
        <h1 class="text-3xl font-black italic text-orange-500 uppercase">Fotos en Vivo</h1>
        <p class="text-zinc-500 text-sm">Escanea tu código o busca tu foto abajo</p>
    </header>

    <div id="galeria" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 p-2">
        </div>

    <script>
        const S_URL = "https://ndmduyqfxlqiirekmnga.supabase.co";
        const S_KEY = "sb_publishable_XgwzbCqmAJoorcGqDxaVgg_SApC-rLo";
        const supabase = supabase.createClient(S_URL, S_KEY);

        async function cargarFotos() {
            const { data, error } = await supabase.storage.from('revelado-live').list('', {
                limit: 100,
                sortBy: { column: 'created_at', order: 'desc' }
            });

            if (data) {
                const contenedor = document.getElementById('galeria');
                contenedor.innerHTML = "";
                data.forEach(foto => {
                    const url = `${S_URL}/storage/v1/object/public/revelado-live/${foto.name}`;
                    contenedor.innerHTML += `
                        <div class="relative group aspect-square bg-zinc-900 overflow-hidden rounded-lg">
                            <img src="${url}" class="w-full h-full object-cover">
                            <a href="${url}" download class="absolute bottom-2 right-2 bg-orange-500 p-2 rounded-full text-xs font-bold">Descargar</a>
                        </div>`;
                });
            }
        }
        setInterval(cargarFotos, 5000); // Se actualiza cada 5 segundos
        cargarFotos();
    </script>
</body>
</html>
